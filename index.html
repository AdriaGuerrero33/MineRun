<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bad Bunny: Camino al Camp Nou 🐰</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;overflow:hidden;font-family:Arial Black,Arial,sans-serif}
canvas{display:block}
#hud{position:fixed;top:0;left:0;width:100%;padding:10px 18px;display:flex;justify-content:space-between;
 background:linear-gradient(rgba(0,0,0,.75),transparent);color:#fff;font-size:17px;font-weight:bold;
 z-index:10;pointer-events:none}
#hud span{text-shadow:1px 1px 3px #000}
#lives{color:#ff5555}
#score{color:#FFD700}
#coins{color:#FFD700}
</style>
</head>
<body>
<div id="hud">
 <span id="lives">❤️ 3</span>
 <span id="score">⭐ 0</span>
 <span id="coins">🪙 0</span>
</div>
<canvas id="c"></canvas>
<script>
const C=document.getElementById("c"),ctx=C.getContext("2d");
function resize(){C.width=window.innerWidth;C.height=window.innerHeight}
resize();window.addEventListener("resize",resize);

// ─── STATE ───
const K={};
document.addEventListener("keydown",e=>{K[e.code]=true;e.preventDefault()});
document.addEventListener("keyup",e=>{K[e.code]=false});

let STATE="MENU",score=0,lives=3,coinCount=0;
let camX=0;
const W=()=>C.width, H=()=>C.height;
const SCALE=()=>H()/480;

// ─── PLAYER ───
const P={
 x:80,y:200,w:36,h:52,vx:0,vy:0,
 onGround:false,jumps:0,dir:1,
 invTimer:0,walkFrame:0,walkTick:0,
 dead:false
};

// ─── LEVEL DATA ───
// platforms: [x,y,w,h,color]
const PLATS=[
 [0,350,400,30,"#4CAF50"],
 [420,310,120,20,"#66BB6A"],
 [580,270,100,20,"#4CAF50"],
 [720,320,140,20,"#81C784"],
 [900,260,110,20,"#4CAF50"],
 [1060,300,90,20,"#66BB6A"],
 [1190,250,130,20,"#4CAF50"],
 [1370,280,120,20,"#81C784"],
 [1530,230,100,20,"#4CAF50"],
 [1670,290,150,20,"#66BB6A"],
 [1860,260,400,30,"#4CAF50"],
];

// coins: [x,y,collected,anim]
const COINS_DATA=[
 [100,310],[160,310],[220,310],[280,310],
 [440,270],[490,270],
 [600,230],[640,230],
 [740,280],[800,280],
 [920,220],[960,220],
 [1070,260],[1110,260],
 [1210,210],[1250,210],[1290,210],
 [1390,240],[1430,240],
 [1550,190],[1590,190],
 [1690,250],[1750,250],[1810,250],
 [1900,220],[1960,220],[2020,220]
];
let coins=COINS_DATA.map(([x,y])=>({x,y,collected:false,a:0}));

// enemies: [x,y,minX,maxX,dir,dead,deadTimer]
const ENEMY_DATA=[
 [450,290,420,560,1],
 [610,250,580,680,1],
 [750,300,720,840,1],
 [930,240,900,1010,1],
 [1070,280,1060,1150,-1],
 [1210,230,1190,1320,1],
 [1400,260,1370,1490,-1],
 [1700,270,1670,1820,1],
 [1900,240,1860,2060,-1],
 [2000,240,1860,2060,1],
];
let enemies=ENEMY_DATA.map(([x,y,minX,maxX,dir])=>({
 x,y,minX,maxX,dir,dead:false,deadTimer:0,
 w:32,h:50,walkTick:0,walkFrame:0
}));

// flag / goal
const FLAG={x:2230,y:200};
// clouds (parallax)
const CLOUDS=Array.from({length:14},(_,i)=>({
 x:i*220+50,y:30+Math.random()*80,w:80+Math.random()*60,speed:0.3+Math.random()*0.2
}));
// trees
const TREES=[];
for(let tx=0;tx<2400;tx+=120+Math.floor(Math.random()*80)){
 TREES.push({x:tx,y:350,h:50+Math.floor(Math.random()*30)});
}

// ─── DRAWING: BAD BUNNY ───
function drawBadBunny(x,y,dir,walk,alpha=1){
 const s=SCALE();
 ctx.save();
 ctx.globalAlpha=alpha;
 ctx.translate(x,y);
 ctx.scale(dir*s,s);
 // shadow
 ctx.fillStyle="rgba(0,0,0,0.2)";
 ctx.ellipse(0,26,18,5,0,0,Math.PI*2);ctx.fill();
 // shoes
 ctx.fillStyle="#fff";
 ctx.fillRect(-14,18,14,8);
 ctx.fillRect(2,18,14,8);
 // legs
 const lk=Math.sin(walk)*10;
 ctx.fillStyle="#1a1a2e";
 ctx.fillRect(-13,2+lk,11,18);
 ctx.fillRect(2,-lk,11,18);
 // body - orange hoodie
 ctx.fillStyle="#ff6b35";
 ctx.fillRect(-15,-22,30,26);
 // hoodie pocket
 ctx.fillStyle="#e55a25";
 ctx.fillRect(-6,-4,12,8);
 // arms
 const ak=Math.sin(walk)*8;
 ctx.fillStyle="#ff6b35";
 ctx.fillRect(-22,-20+ak,8,18);
 ctx.fillRect(14,-20-ak,8,18);
 // head
 ctx.fillStyle="#d4956a";
 ctx.beginPath();ctx.ellipse(0,-34,14,14,0,0,Math.PI*2);ctx.fill();
 // bunny ears
 ctx.fillStyle="#ff6b35";
 ctx.fillRect(-9,-62,7,30);
 ctx.fillRect(3,-62,7,30);
 ctx.fillStyle="#ffaaaa";
 ctx.fillRect(-7,-60,4,25);
 ctx.fillRect(4,-60,4,25);
 // sunglasses
 ctx.fillStyle="#000";
 ctx.fillRect(-13,-37,10,6);
 ctx.fillRect(3,-37,10,6);
 ctx.fillStyle="#333";
 ctx.fillRect(-3,-37,6,3);
 // mouth
 ctx.fillStyle="#a06040";
 ctx.fillRect(-4,-26,8,3);
 ctx.restore();
}

// ─── DRAWING: ANUEL AA ───
function drawAnuel(x,y,dir,walk,alpha=1){
 const s=SCALE();
 ctx.save();
 ctx.globalAlpha=alpha;
 ctx.translate(x,y);
 ctx.scale(dir*s,s);
 // shadow
 ctx.fillStyle="rgba(0,0,0,0.2)";
 ctx.ellipse(0,25,16,5,0,0,Math.PI*2);ctx.fill();
 // shoes - white
 ctx.fillStyle="#fff";
 ctx.fillRect(-12,17,12,7);
 ctx.fillRect(1,17,12,7);
 // legs - black
 const lk=Math.sin(walk)*10;
 ctx.fillStyle="#111";
 ctx.fillRect(-12,2+lk,10,17);
 ctx.fillRect(2,-lk,10,17);
 // body - black
 ctx.fillStyle="#111";
 ctx.fillRect(-13,-20,26,24);
 // gold chain
 ctx.strokeStyle="#FFD700";ctx.lineWidth=2;
 ctx.beginPath();ctx.arc(0,-10,9,Math.PI*.2,Math.PI*.8);ctx.stroke();
 ctx.fillStyle="#FFD700";
 ctx.beginPath();ctx.arc(0,-1,3,0,Math.PI*2);ctx.fill();
 // arms
 const ak=Math.sin(walk)*8;
 ctx.fillStyle="#111";
 ctx.fillRect(-20,-18+ak,8,18);
 ctx.fillRect(12,-18-ak,8,18);
 // head
 ctx.fillStyle="#c68642";
 ctx.beginPath();ctx.ellipse(0,-32,13,13,0,0,Math.PI*2);ctx.fill();
 // cap
 ctx.fillStyle="#000";
 ctx.fillRect(-13,-43,26,14);
 ctx.fillRect(-16,-33,32,5);
 // tattoo marks
 ctx.fillStyle="#334";
 ctx.fillRect(7,-35,3,10);
 ctx.fillRect(5,-28,2,6);
 // eyes
 ctx.fillStyle="#000";
 ctx.fillRect(-8,-35,5,4);
 ctx.fillRect(3,-35,5,4);
 // beard
 ctx.fillStyle="#8B4513";
 ctx.fillRect(-9,-24,18,4);
 ctx.restore();
}

// ─── DRAWING: CAMP NOU STADIUM ───
function drawStadium(x,y){
 const s=SCALE();
 ctx.save();ctx.translate(x*s-camX*s,y*s);ctx.scale(s,s);
 // outer walls
 ctx.fillStyle="#3344aa";
 ctx.fillRect(-120,-80,240,80);
 // inner field
 ctx.fillStyle="#2d8a2d";
 ctx.fillRect(-90,-60,180,55);
 // field lines
 ctx.strokeStyle="rgba(255,255,255,0.6)";ctx.lineWidth=2;
 ctx.strokeRect(-85,-55,170,45);
 ctx.beginPath();ctx.arc(0,-32,18,0,Math.PI*2);ctx.stroke();
 ctx.beginPath();ctx.moveTo(0,-55);ctx.lineTo(0,-10);ctx.stroke();
 // roof
 ctx.fillStyle="#8899cc";
 ctx.fillRect(-125,-88,250,12);
 // arches
 ctx.fillStyle="#2233aa";
 for(let i=0;i<8;i++){
  ctx.fillRect(-112+i*32,-80,18,60);
 }
 // CAMP NOU sign
 ctx.fillStyle="#fff";
 ctx.font="bold 14px Arial";ctx.textAlign="center";
 ctx.fillText("CAMP NOU",0,-92);
 // flag on top
 ctx.fillStyle="#c00";
 ctx.fillRect(-5,-120,3,35);
 ctx.fillRect(-2,-120,22,14);
 ctx.restore();
}

// ─── DRAW FLAG / GOAL ───
function drawFlag(x){
 const s=SCALE();
 const sx=x*s-camX*s;
 ctx.save();
 ctx.fillStyle="#888";
 ctx.fillRect(sx-2,H()-350*s,(4*s),120*s);
 ctx.fillStyle="#e00";
 ctx.fillRect(sx,(H()-350*s)-2,40*s,28*s);
 ctx.fillStyle="#fff";
 ctx.font=`bold ${14*s}px Arial`;ctx.textAlign="left";
 ctx.fillText("META",sx+4*s,(H()-350*s)+18*s);
 ctx.restore();
}

// ─── DRAW COIN ───
function drawCoin(coin){
 const s=SCALE();
 if(coin.collected)return;
 const sx=coin.x*s-camX*s;
 const sy=coin.y*s;
 const wobble=Math.cos(coin.a)*6*s;
 ctx.save();
 ctx.fillStyle="#FFD700";
 ctx.shadowColor="#FFD700";ctx.shadowBlur=8;
 ctx.beginPath();
 ctx.ellipse(sx,sy,9*s,9*s,0,0,Math.PI*2);
 ctx.fill();
 ctx.fillStyle="#FFF176";
 ctx.beginPath();
 ctx.ellipse(sx,sy,(2+wobble/2)*s,7*s,0,0,Math.PI*2);
 ctx.fill();
 ctx.shadowBlur=0;
 ctx.restore();
}

// ─── DRAW BACKGROUND ───
function drawBG(){
 // sky gradient
 const grad=ctx.createLinearGradient(0,0,0,H());
 grad.addColorStop(0,"#87CEEB");grad.addColorStop(1,"#c8e8f8");
 ctx.fillStyle=grad;ctx.fillRect(0,0,W(),H());
 // clouds parallax
 const s=SCALE();
 CLOUDS.forEach(cl=>{
  cl.x-=cl.speed*0.5;
  if(cl.x*s-camX*s*0.4<-cl.w*s)cl.x=W()/s+cl.w;
  const cx=cl.x*s-camX*s*0.4;
  const cy=cl.y*s;
  ctx.fillStyle="rgba(255,255,255,0.9)";
  ctx.beginPath();ctx.ellipse(cx,cy,cl.w*s*.5,18*s,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx-cl.w*s*.2,cy+5*s,cl.w*s*.35,14*s,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+cl.w*s*.2,cy+5*s,cl.w*s*.35,14*s,0,0,Math.PI*2);ctx.fill();
 });
 // mountains far bg
 ctx.fillStyle="#99aabb";
 [[100,280,200],[400,240,180],[700,260,220],[1000,230,190],[1400,250,210],[1800,235,200],[2100,245,180]].forEach(([mx,my,mw])=>{
  const sx2=mx*s-camX*s*0.6;
  ctx.beginPath();ctx.moveTo(sx2-mw*s,H());ctx.lineTo(sx2,my*s);ctx.lineTo(sx2+mw*s,H());ctx.fill();
 });
 // ground
 ctx.fillStyle="#388e3c";
 ctx.fillRect(0,H()-20*s,W(),20*s);
 ctx.fillStyle="#2d7a2d";
 ctx.fillRect(0,H()-20*s,W(),6*s);
 // trees
 TREES.forEach(t=>{
  const tx2=t.x*s-camX*s;
  if(tx2<-60*s||tx2>W()+60*s)return;
  const ty=H()-20*s;
  ctx.fillStyle="#5d4037";
  ctx.fillRect(tx2-4*s,ty-t.h*s,8*s,t.h*s);
  ctx.fillStyle="#2e7d32";
  ctx.beginPath();ctx.arc(tx2,ty-t.h*s-12*s,18*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#388e3c";
  ctx.beginPath();ctx.arc(tx2-5*s,ty-t.h*s-6*s,12*s,0,Math.PI*2);ctx.fill();
 });
}

// ─── DRAW PLATFORMS ───
function drawPlatforms(){
 const s=SCALE();
 PLATS.forEach(([px,py,pw,ph,col])=>{
  const sx=px*s-camX*s;
  if(sx>W()+50||sx+pw*s<-50)return;
  // top surface
  ctx.fillStyle=col;
  ctx.fillRect(sx,py*s,pw*s,ph*s);
  // dark edge
  ctx.fillStyle="rgba(0,0,0,0.25)";
  ctx.fillRect(sx,py*s+ph*s*0.7,pw*s,ph*s*0.3);
  // highlight top
  ctx.fillStyle="rgba(255,255,255,0.3)";
  ctx.fillRect(sx,py*s,pw*s,4*s);
 });
}

// ─── PHYSICS ───
const GRAVITY=0.5,JUMP_F=-11,MAX_FALL=14,SPEED=4;

function platCollide(obj){
 const s=SCALE();
 const ox=obj.x/1,oy=obj.y/1;
 const ow=obj.w,oh=obj.h;
 for(const [px,py,pw,ph] of PLATS){
  const left=px,right=px+pw,top=py,bot=py+ph;
  const oleft=ox-ow/2,oright=ox+ow/2,otop=oy-oh,obot=oy;
  if(oright>left&&oleft<right&&obot>top&&otop<bot){
   if(obj.vy>=0&&obot-obj.vy<=top+2){
    obj.y=top;obj.vy=0;return true;
   }
  }
 }
 return false;
}

// ─── PARTICLES ───
let particles=[];
function spawnParticles(x,y,col,n=8){
 for(let i=0;i<n;i++){
  const ang=Math.random()*Math.PI*2;
  const spd=2+Math.random()*4;
  particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-3,life:1,col});
 }
}

// ─── SCREEN FX ───
let screenMsg="",screenMsgTimer=0;
function flashMsg(txt,dur=120){screenMsg=txt;screenMsgTimer=dur;}

// ─── UPDATE ───
let frameCount=0;
function update(){
 if(STATE!=="PLAY")return;
 frameCount++;
 const floorY=H()/SCALE()-20;

 // player movement
 P.vx=0;
 if(K["ArrowLeft"]||K["KeyA"]){P.vx=-SPEED;P.dir=-1;}
 if(K["ArrowRight"]||K["KeyD"]){P.vx=SPEED;P.dir=1;}
 if((K["Space"]||K["ArrowUp"]||K["KeyW"])&&!K["_jh"]){
  if(P.jumps<2){P.vy=JUMP_F;P.jumps++;K["_jh"]=true;}
 }
 if(!K["Space"]&&!K["ArrowUp"]&&!K["KeyW"])K["_jh"]=false;

 P.vy=Math.min(P.vy+GRAVITY,MAX_FALL);
 P.x+=P.vx;P.y+=P.vy;

 // walk animation
 if(P.vx!==0){P.walkTick++;if(P.walkTick%6===0)P.walkFrame++;}

 // platform collision
 P.onGround=false;
 const wasOnGround=platCollide(P);
 if(wasOnGround){P.onGround=true;P.jumps=0;}

 // world bounds
 if(P.x<30)P.x=30;

 // fall death
 if(P.y>floorY+60){
  lives--;updateHUD();
  if(lives<=0){STATE="GAMEOVER";return;}
  P.x=80;P.y=200;P.vy=0;P.vx=0;P.jumps=0;
  P.invTimer=180;
  flashMsg("💀 ¡Cuidado!");
 }

 // invincibility
 if(P.invTimer>0)P.invTimer--;

 // camera
 camX=Math.max(0,P.x-W()/(SCALE()*3));

 // coins
 coins.forEach(c=>{
  if(c.collected)return;
  c.a+=0.08;
  if(Math.abs(P.x-c.x)<22&&Math.abs(P.y-c.y)<24){
   c.collected=true;coinCount++;score+=50;
   spawnParticles(c.x*SCALE()-camX*SCALE(),c.y*SCALE(),"#FFD700",6);
   updateHUD();
  }
 });

 // enemies
 enemies.forEach(en=>{
  if(en.dead){en.deadTimer--;return;}
  en.x+=en.dir*1.8;
  if(en.x<en.minX||en.x>en.maxX)en.dir*=-1;
  en.walkTick++;if(en.walkTick%8===0)en.walkFrame++;

  // stomp check
  const dx=Math.abs(P.x-en.x);
  const dy=P.y-en.y;
  if(dx<28&&dy>-8&&dy<20&&P.vy>0){
   en.dead=true;en.deadTimer=60;
   score+=200;P.vy=JUMP_F*0.7;
   spawnParticles(en.x*SCALE()-camX*SCALE(),en.y*SCALE(),"#ff4444",10);
   flashMsg("🔥 ¡Anuel eliminado! +200");
   updateHUD();
  }else if(dx<24&&Math.abs(P.y-en.y)<40&&P.invTimer===0){
   lives--;updateHUD();
   P.invTimer=180;P.vy=JUMP_F*0.5;
   if(lives<=0){STATE="GAMEOVER";return;}
   flashMsg("💥 ¡Te pegó Anuel! ❤️-1");
  }
 });

 // particles
 particles=particles.filter(pt=>{
  pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.2;pt.life-=0.025;return pt.life>0;
 });

 // win condition
 if(P.x>FLAG.x-30){
  score+=lives*500+coinCount*10;
  STATE="WIN";
 }
}

// ─── DRAW ───
function draw(){
 ctx.clearRect(0,0,W(),H());
 const s=SCALE();
 drawBG();
 drawPlatforms();

 // draw stadium (goal)
 drawStadium(FLAG.x+120,380-80);
 drawFlag(FLAG.x);

 // coins
 coins.forEach(drawCoin);

 // enemies
 enemies.forEach(en=>{
  if(en.dead)return;
  const ex=en.x*s-camX*s;
  const ey=en.y*s;
  drawAnuel(ex,ey,en.dir,en.walkFrame*0.5);
 });

 // player
 if(P.invTimer===0||frameCount%8<4){
  const px=P.x*s-camX*s;
  const py=P.y*s;
  drawBadBunny(px,py,P.dir,P.walkFrame*0.5);
 }

 // particles
 particles.forEach(pt=>{
  ctx.save();ctx.globalAlpha=pt.life;
  ctx.fillStyle=pt.col;
  ctx.beginPath();ctx.arc(pt.x,pt.y,4*s,0,Math.PI*2);ctx.fill();
  ctx.restore();
 });

 // screen message
 if(screenMsgTimer>0){
  screenMsgTimer--;
  const alpha=Math.min(1,screenMsgTimer/20);
  ctx.save();ctx.globalAlpha=alpha;
  ctx.fillStyle="rgba(0,0,0,0.6)";
  ctx.fillRect(W()/2-160*s,H()/2-30*s,320*s,55*s);
  ctx.fillStyle="#FFD700";
  ctx.font=`bold ${20*s}px Arial`;ctx.textAlign="center";
  ctx.fillText(screenMsg,W()/2,H()/2+10*s);
  ctx.restore();
 }

 // overlay screens
 if(STATE==="MENU")drawMenu();
 if(STATE==="GAMEOVER")drawGameOver();
 if(STATE==="WIN")drawWin();
}

// ─── SCREENS ───
function overlay(alpha=0.85){
 ctx.fillStyle=`rgba(0,0,0,${alpha})`;ctx.fillRect(0,0,W(),H());
}
function drawMenu(){
 overlay();
 const s=SCALE();
 // title
 ctx.save();
 ctx.fillStyle="#FFD700";
 ctx.shadowColor="#FFD700";ctx.shadowBlur=30;
 ctx.font=`bold ${52*s}px Arial Black`;ctx.textAlign="center";
 ctx.fillText("🐰 BAD BUNNY",W()/2,H()*0.22);
 ctx.shadowBlur=0;
 ctx.fillStyle="#ff6b35";
 ctx.font=`bold ${26*s}px Arial`;
 ctx.fillText("Camino al Camp Nou 🏟️",W()/2,H()*0.31);
 // mini character preview
 drawBadBunny(W()/2-80*s,H()*0.48,1,0);
 drawAnuel(W()/2+80*s,H()*0.48,-1,0);
 // VS text
 ctx.fillStyle="#fff";
 ctx.font=`bold ${28*s}px Arial Black`;
 ctx.fillText("VS",W()/2,H()*0.46);
 ctx.fillStyle="#aaa";ctx.font=`${13*s}px Arial`;
 ctx.fillText("Bad Bunny",W()/2-80*s,H()*0.55);
 ctx.fillText("Anuel AA",W()/2+80*s,H()*0.55);
 // button
 const bw=200*s,bh=50*s,bx=W()/2-bw/2,by=H()*0.62;
 const gr=ctx.createLinearGradient(bx,by,bx,by+bh);
 gr.addColorStop(0,"#FFD700");gr.addColorStop(1,"#ff6b35");
 ctx.fillStyle=gr;
 roundRect(bx,by,bw,bh,12*s);ctx.fill();
 ctx.fillStyle="#000";ctx.font=`bold ${22*s}px Arial`;
 ctx.fillText("▶ JUGAR",W()/2,by+32*s);
 // controls
 ctx.fillStyle="#aaa";ctx.font=`${12*s}px Arial`;
 ctx.fillText("← → Mover  |  ESPACIO / ↑ Saltar (doble salto)  |  Pisa a Anuel para eliminarle",W()/2,H()*0.76);
 ctx.restore();
}
function roundRect(x,y,w,h,r){
 ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
 ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);
 ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}
function drawGameOver(){
 overlay();
 const s=SCALE();ctx.save();ctx.textAlign="center";
 ctx.fillStyle="#ff4444";ctx.shadowColor="#ff4444";ctx.shadowBlur=20;
 ctx.font=`bold ${48*s}px Arial Black`;ctx.fillText("💀 GAME OVER",W()/2,H()*0.3);
 ctx.shadowBlur=0;ctx.fillStyle="#ff8888";
 ctx.font=`${20*s}px Arial`;ctx.fillText("Anuel AA te paró el concierto...",W()/2,H()*0.42);
 ctx.fillStyle="#FFD700";ctx.font=`bold ${18*s}px Arial`;
 ctx.fillText(`Score: ${score}  |  Monedas: ${coinCount}`,W()/2,H()*0.52);
 const bw=220*s,bh=50*s,bx=W()/2-bw/2,by=H()*0.62;
 ctx.fillStyle="#ff4444";roundRect(bx,by,bw,bh,12*s);ctx.fill();
 ctx.fillStyle="#fff";ctx.font=`bold ${20*s}px Arial`;ctx.fillText("🔄 Reintentar",W()/2,by+32*s);
 ctx.restore();
}
function drawWin(){
 overlay(0.8);
 const s=SCALE();ctx.save();ctx.textAlign="center";
 // confetti
 for(let i=0;i<60;i++){
  const cx=Math.sin(frameCount*0.02+i)*W()/2+W()/2;
  const cy=((frameCount*2+i*20)%H());
  ctx.fillStyle=`hsl(${i*20},100%,60%)`;
  ctx.fillRect(cx,cy,8*s,8*s);
 }
 ctx.fillStyle="#FFD700";ctx.shadowColor="#FFD700";ctx.shadowBlur=30;
 ctx.font=`bold ${46*s}px Arial Black`;ctx.fillText("🎉 ¡CONCIERTO!",W()/2,H()*0.25);
 ctx.shadowBlur=0;ctx.fillStyle="#fff";
 ctx.font=`${22*s}px Arial`;ctx.fillText("¡Bad Bunny llega al Camp Nou! 🏟️",W()/2,H()*0.37);
 ctx.fillStyle="#FFD700";ctx.font=`bold ${20*s}px Arial`;
 ctx.fillText(`🏆 Score Final: ${score}`,W()/2,H()*0.47);
 ctx.fillText(`🪙 ${coinCount} monedas  |  ❤️ ${lives} vidas`,W()/2,H()*0.56);
 ctx.fillStyle="#ff6b35";ctx.font=`bold ${18*s}px Arial`;
 ctx.fillText("¡El estadio explota! 🔥🐰🔥",W()/2,H()*0.64);
 const bw=230*s,bh=50*s,bx=W()/2-bw/2,by=H()*0.72;
 const gr=ctx.createLinearGradient(bx,by,bx,by+bh);
 gr.addColorStop(0,"#FFD700");gr.addColorStop(1,"#ff6b35");
 ctx.fillStyle=gr;roundRect(bx,by,bw,bh,12*s);ctx.fill();
 ctx.fillStyle="#000";ctx.font=`bold ${20*s}px Arial`;ctx.fillText("🔄 Jugar de nuevo",W()/2,by+32*s);
 ctx.restore();
}

function updateHUD(){
 document.getElementById("lives").textContent="❤️ "+lives;
 document.getElementById("score").textContent="⭐ "+score;
 document.getElementById("coins").textContent="🪙 "+coinCount;
}

// ─── INPUT: CLICK/TAP on buttons ───
C.addEventListener("click",e=>{
 const s=SCALE();
 const bw=200*s,bh=50*s,bx=W()/2-bw/2,by=H()*0.62;
 const rx=e.clientX,ry=e.clientY;
 if(STATE==="MENU"||STATE==="GAMEOVER"||STATE==="WIN"){
  if(rx>=bx&&rx<=bx+bw&&ry>=by&&ry<=by+bh){
   resetGame();
  }
 }
});
// also spacebar/enter on menu
document.addEventListener("keydown",e=>{
 if((STATE==="MENU"||STATE==="GAMEOVER"||STATE==="WIN")&&(e.code==="Space"||e.code==="Enter"||e.code==="KeyW"||e.code==="ArrowUp")){
  resetGame();
 }
});

function resetGame(){
 score=0;lives=3;coinCount=0;
 coins=COINS_DATA.map(([x,y])=>({x,y,collected:false,a:0}));
 enemies=ENEMY_DATA.map(([x,y,minX,maxX,dir])=>({x,y,minX,maxX,dir,dead:false,deadTimer:0,w:32,h:50,walkTick:0,walkFrame:0}));
 P.x=80;P.y=200;P.vx=0;P.vy=0;P.jumps=0;P.invTimer=0;P.walkFrame=0;P.dir=1;
 camX=0;particles=[];frameCount=0;
 updateHUD();STATE="PLAY";
}

// ─── MOBILE CONTROLS ───
function addBtn(label,code,left,bottom,right){
 const btn=document.createElement("button");
 btn.textContent=label;
 btn.style.cssText=`position:fixed;${left!==null?"left:"+left+"px;":""}${right!==null?"right:"+right+"px;":""}bottom:${bottom}px;
  padding:14px 22px;font-size:26px;background:rgba(255,255,255,0.22);border:2px solid rgba(255,255,255,0.5);
  border-radius:50%;color:#fff;cursor:pointer;z-index:50;user-select:none;-webkit-user-select:none;touch-action:none;`;
 btn.addEventListener("touchstart",e=>{e.preventDefault();K[code]=true;},{passive:false});
 btn.addEventListener("touchend",e=>{e.preventDefault();K[code]=false;},{passive:false});
 document.body.appendChild(btn);
}
if("ontouchstart" in window){
 addBtn("◀","ArrowLeft",20,25,null);
 addBtn("▶","ArrowRight",120,25,null);
 addBtn("⬆","Space",null,25,20);
}

// ─── LOOP ───
function loop(){requestAnimationFrame(loop);update();draw();}
loop();
</script>
</body>
